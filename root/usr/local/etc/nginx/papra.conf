# Papra nginx configuration for single-container daemonless use.
# nginx serves the Vite SPA statically and reverse-proxies the API to the
# in-container node backend at 127.0.0.1:1222 (managed by s6).

pid        /var/run/nginx.pid;
worker_processes 1;

events {
    worker_connections 256;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    # Logging to stdout/stderr for container use.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml
               application/javascript application/json
               image/svg+xml;

    # Document uploads can be large; allow generous bodies. Tune via deployment if needed.
    client_max_body_size 100m;

    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    server {
        listen 1221;
        server_name localhost;

        # Security headers.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        root /app/public;
        index index.html;

        # API + auth + everything the backend owns. Papra mounts all server routes
        # under /api/ (see apps/papra-server server.routes.ts).
        location ^~ /api/ {
            proxy_pass http://127.0.0.1:1222;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_buffer_size 16k;
            proxy_buffers 16 64k;
            proxy_busy_buffers_size 128k;
        }

        # Hashed Vite build assets — safe to cache aggressively.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, no-transform, immutable";
            try_files $uri =404;
        }

        # ES-module assets (.mjs) — e.g. the pdf.js worker. The stock nginx
        # mime.types has no .mjs mapping, so it would fall back to
        # application/octet-stream; browsers then refuse to start the module
        # worker and PDF previews never render. Force a JavaScript type.
        location ~* \.mjs$ {
            types { }
            default_type application/javascript;
            expires 1y;
            add_header Cache-Control "public, no-transform, immutable";
        }

        location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # SPA fallback — serve index.html for client-side routes.
        location / {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }
    }
}
